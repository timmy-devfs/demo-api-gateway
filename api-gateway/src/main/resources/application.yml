# ════════════════════════════════════════════════════════════════
# BICAP — API Gateway (Spring Boot 3.5 / Spring Cloud 2024)
# ════════════════════════════════════════════════════════════════

server:
  port: 8080

spring:
  application:
    name: api-gateway

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  cloud:
    gateway:
      server:
        webflux:

          # ── Forwarded headers ─────────────────────────────────
          forwarded:
            enabled: true

          # ── Global CORS ───────────────────────────────────────
          globalcors:
            cors-configurations:
              "[/**]":
                allowed-origins:
                  - "http://localhost:3000"
                  - "http://localhost:3001"
                  - "http://localhost:3002"
                  - "http://localhost:3003"
                  - "http://localhost:3004"
                allowed-methods: ["GET","POST","PUT","DELETE","OPTIONS","PATCH"]
                allowed-headers: ["*"]
                allow-credentials: true
                max-age: 3600

          # ── Routes ───────────────────────────────────────────
          routes:

            # identity-service :8081
            - id: identity-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/auth/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: identity-cb
                    fallbackUri: forward:/fallback/identity

            # farm-service :8082
            - id: farm-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/farm/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: farm-cb
                    fallbackUri: forward:/fallback/farm
                - AddRequestHeader=X-Gateway-Source, bicap-gateway

            # retailer-service :8083
            - id: retailer-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/retail/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: retailer-cb
                    fallbackUri: forward:/fallback/retailer

            # shipping-service :8084
            - id: shipping-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/shipping/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: shipping-cb
                    fallbackUri: forward:/fallback/shipping

            # notification-service :8085
            - id: notification-service
              uri: http://localhost:8085
              predicates:
                - Path=/api/notify/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: notification-cb
                    fallbackUri: forward:/fallback/notification

            # payment-service :8086
            - id: payment-service
              uri: http://localhost:8086
              predicates:
                - Path=/api/pay/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: payment-cb
                    fallbackUri: forward:/fallback/payment

            # iot-service :8087
            - id: iot-service
              uri: http://localhost:8087
              predicates:
                - Path=/api/iot/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: iot-cb
                    fallbackUri: forward:/fallback/iot

            # report-service :8088
            - id: report-service
              uri: http://localhost:8088
              predicates:
                - Path=/api/reports/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: report-cb
                    fallbackUri: forward:/fallback/report

            # guest-service :8089
            - id: guest-service
              uri: http://localhost:8089
              predicates:
                - Path=/api/public/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: guest-cb
                    fallbackUri: forward:/fallback/guest

            # blockchain-service :8090 (NodeJS)
            - id: blockchain-service
              uri: http://localhost:8090
              predicates:
                - Path=/api/chain/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: blockchain-cb
                    fallbackUri: forward:/fallback/blockchain

# ── Resilience4j Circuit Breaker ──────────────────────────────
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
    instances:
      identity-cb:
        base-config: default
      farm-cb:
        base-config: default
      retailer-cb:
        base-config: default
      shipping-cb:
        base-config: default
      notification-cb:
        base-config: default
      payment-cb:
        base-config: default
      iot-cb:
        base-config: default
      report-cb:
        base-config: default
      guest-cb:
        base-config: default
      blockchain-cb:
        sliding-window-size: 10
        failure-rate-threshold: 60
        wait-duration-in-open-state: 20s

# ── Identity Service URL ───────────────────────────────────────
identity:
  service:
    url: http://localhost:8081
    introspect-path: /api/auth/introspect

# ── Gateway config ─────────────────────────────────────────────
gateway:
  jwt-cache-ttl-seconds: 300
  rate-limit:
    anonymous-per-minute: 100
    authenticated-per-minute: 500

# ── Actuator ──────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, gateway
  endpoint:
    health:
      show-details: always
    gateway:
      access: unrestricted    # ← đổi từ enabled: true (đã bị xóa ở 3.5)

# ── Logging ───────────────────────────────────────────────────
logging:
  level:
    com.bicap.api_gateway: DEBUG
    org.springframework.cloud.gateway: INFO