server:
  port: 8084  # Cổng chạy service này

spring:
  application:
    name: shipping-service

  # Kết nối PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/shipping_db?TimeZone=UTC
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: validate   # Không tự tạo bảng, để Flyway lo
    show-sql: true         # In câu SQL ra console khi debug

  # Flyway tự chạy các file V1__..sql → V5__..sql khi khởi động
  flyway:
    enabled: true
    locations: classpath:db/migration

  # Kafka
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: shipping-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# Cho phép gọi /actuator/health để kiểm tra service
management:
  endpoints:
    web:
      exposure:
        include: health
