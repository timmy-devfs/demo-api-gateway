# ════════════════════════════════════════════════════════════════
# BICAP Redis Configuration
# ════════════════════════════════════════════════════════════════

# ── Binding ───────────────────────────────────────────────────
bind 0.0.0.0
port 6379
protected-mode no

# ── Memory ────────────────────────────────────────────────────
# 256MB max — khi đầy dùng allkeys-lru để evict key cũ nhất
maxmemory 256mb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# ── Persistence ───────────────────────────────────────────────
# RDB snapshot — lưu mỗi 60s nếu có >= 1000 thay đổi
save 60 1000
save 300 100
save 900 1

# AOF — append-only log (tắt trong dev để nhẹ hơn, bật khi prod)
appendonly no
appendfsync everysec

# ── Performance ───────────────────────────────────────────────
# Số databases (mặc định 16 — BICAP dùng DB 0)
databases 16

# Timeout kết nối (0 = không timeout)
timeout 0

# TCP keepalive
tcp-keepalive 300

# ── Logging ───────────────────────────────────────────────────
loglevel notice
logfile ""

# ── Slow log ──────────────────────────────────────────────────
# Log query chậm hơn 10ms
slowlog-log-slower-than 10000
slowlog-max-len 128