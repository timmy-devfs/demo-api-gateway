# ════════════════════════════════════════════════════════════════
# BICAP Nginx — Layer 1 (Development)
# Nginx → Spring Cloud Gateway :8080 → 10 Services
# ════════════════════════════════════════════════════════════════

events {
    worker_connections 1024;
}

http {
    # ── Logging format ────────────────────────────────────────
    log_format bicap '$remote_addr [$time_local] '
                     '"$request" $status $body_bytes_sent '
                     '"$http_referer" rt=$request_time '
                     'xrid=$upstream_http_x_request_id';

    access_log /var/log/nginx/access.log bicap;
    error_log  /var/log/nginx/error.log  warn;

    # ── Gzip ─────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # ── Upstream: Spring Cloud Gateway ───────────────────────
    upstream api_gateway {
        # Đang dev: gateway chạy trên host machine
        server host.docker.internal:8080;
        # Khi containerize: server api-gateway:8080;
    }

    # ── Web Apps upstreams ────────────────────────────────────
    upstream web_admin    { server host.docker.internal:3000; }
    upstream web_farm     { server host.docker.internal:3001; }
    upstream web_retailer { server host.docker.internal:3002; }
    upstream web_shipping { server host.docker.internal:3003; }
    upstream web_public   { server host.docker.internal:3004; }

    # ════ API Gateway (tất cả /api/** đi qua đây) ════════════
    server {
        listen 80;
        server_name localhost _;

        # ── /api/** → Spring Cloud Gateway → Services ────────
        location /api/ {
            proxy_pass         http://api_gateway;
            proxy_http_version 1.1;

            # Forward real client info
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts (Gateway tự có timeout per route)
            proxy_connect_timeout  5s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;

            # Buffer
            proxy_buffering       on;
            proxy_buffer_size     4k;
            proxy_buffers         8 16k;
        }

        # ── Gateway health ────────────────────────────────────
        location /api/gateway/ {
            proxy_pass http://api_gateway;
            proxy_set_header Host $host;
        }

        # ── Actuator (dev only — tắt trên prod) ──────────────
        location /actuator/ {
            proxy_pass http://api_gateway;
            proxy_set_header Host $host;
        }

        # ── Test: trả về 200 khi Nginx healthy ───────────────────
        location /nginx-health {
            return 200 '{"status":"Nginx UP"}';
            add_header Content-Type application/json;
        }
    }

    # ════ Web Admin :3000 ═════════════════════════════════════
    server {
        listen 80;
        server_name admin.localhost;
        location / {
            proxy_pass         http://web_admin;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
        }
    }

    # ════ Web Farm :3001 ══════════════════════════════════════
    server {
        listen 80;
        server_name farm.localhost;
        location / {
            proxy_pass         http://web_farm;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
        }
    }

    # ════ Web Retailer :3002 ══════════════════════════════════
    server {
        listen 80;
        server_name retail.localhost;
        location / {
            proxy_pass http://web_retailer;
            proxy_set_header Host $host;
        }
    }

    # ════ Web Shipping :3003 ══════════════════════════════════
    server {
        listen 80;
        server_name shipping.localhost;
        location / {
            proxy_pass http://web_shipping;
            proxy_set_header Host $host;
        }
    }

    # ════ Web Public :3004 (default) ══════════════════════════
    server {
        listen 80;
        server_name bicap.localhost _;
        location / {
            proxy_pass http://web_public;
            proxy_set_header Host $host;
        }
    }
}