# ════════════════════════════════════════════════════════════════
# BICAP Nginx — Production (SSL + domain)
# Sprint 5: điền domain thật vào, cấu hình Let's Encrypt
# ════════════════════════════════════════════════════════════════

events {
    worker_connections 2048;
}

http {
    # ── Security headers ─────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Gzip compression ─────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1000;

    # ── Rate limiting ────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    upstream api_gateway  { server api-gateway:8080; }
    upstream web_admin    { server web-admin:3000;   }
    upstream web_farm     { server web-farm:3001;    }
    upstream web_retailer { server web-retailer:3002;}
    upstream web_shipping { server web-shipping:3003;}
    upstream web_public   { server web-public:3004;  }

    # ── HTTP → HTTPS redirect ────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── API Gateway (HTTPS) ──────────────────────────────────
    server {
        listen 443 ssl;
        server_name api.bicap.example.com;

        ssl_certificate     /etc/letsencrypt/live/bicap.example.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/bicap.example.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        location / {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://api_gateway;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # ── Web Public (HTTPS) ───────────────────────────────────
    server {
        listen 443 ssl;
        server_name bicap.example.com www.bicap.example.com;

        ssl_certificate     /etc/letsencrypt/live/bicap.example.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/bicap.example.com/privkey.pem;

        location / {
            proxy_pass http://web_public;
            proxy_set_header Host              $host;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}