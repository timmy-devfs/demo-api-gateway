# ════════════════════════════════════════════════════════════════
# BICAP SYSTEM — Docker Compose Production
# Dùng cho Sprint 5 deploy VPS
# Chạy: docker-compose -f docker-compose.prod.yml up -d
# ════════════════════════════════════════════════════════════════

version: "3.9"

networks:
  bicap-network:
    driver: bridge

volumes:
  kafka-data:
  zookeeper-data:
  zookeeper-log:
  redis-data:
  mysql-data:
  nifi-data:
  nifi-logs:
  prometheus-data:
  grafana-data:

# ── Logging mặc định cho tất cả services ─────────────────────
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

# ── Restart policy mặc định ───────────────────────────────────
x-restart: &default-restart
  restart: unless-stopped

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: bicap-zookeeper
    <<: *default-restart
    networks: [bicap-network]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    logging: *default-logging

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: bicap-kafka
    <<: *default-restart
    networks: [bicap-network]
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://${VPS_HOST:-localhost}:9092,INTERNAL://kafka:29092
      KAFKA_LISTENERS: EXTERNAL://0.0.0.0:9092,INTERNAL://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka-data:/var/lib/kafka/data
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    logging: *default-logging

  redis:
    image: redis:7.2-alpine
    container_name: bicap-redis
    <<: *default-restart
    networks: [bicap-network]
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD:-bicap2025}
    volumes:
      - redis-data:/data
      - ./infrastructure/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    logging: *default-logging

  mysql:
    image: mysql:8.0
    container_name: bicap-mysql
    <<: *default-restart
    networks: [bicap-network]
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-12123}
      MYSQL_USER: ${DB_USERNAME:-bicap_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-12123}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"
    logging: *default-logging

  nifi:
    image: apache/nifi:1.23.0
    container_name: bicap-nifi
    <<: *default-restart
    networks: [bicap-network]
    ports:
      - "127.0.0.1:8443:8443"    # Chỉ localhost
    environment:
      SINGLE_USER_CREDENTIALS_USERNAME: ${NIFI_USERNAME:-admin}
      SINGLE_USER_CREDENTIALS_PASSWORD: ${NIFI_PASSWORD:-adminadminadmin}
      NIFI_WEB_HTTPS_PORT: 8443
    volumes:
      - nifi-data:/opt/nifi/nifi-current/conf
      - nifi-logs:/opt/nifi/nifi-current/logs
      - ./infrastructure/nifi/flows:/opt/nifi/nifi-current/flow-templates
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.0"
    logging: *default-logging

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: bicap-prometheus
    <<: *default-restart
    networks: [bicap-network]
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"
    logging: *default-logging

  grafana:
    image: grafana/grafana:10.1.0
    container_name: bicap-grafana
    <<: *default-restart
    networks: [bicap-network]
    ports:
      - "127.0.0.1:3100:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    logging: *default-logging

  nginx:
    image: nginx:1.25-alpine
    container_name: bicap-nginx
    <<: *default-restart
    networks: [bicap-network]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.25"
    logging: *default-logging